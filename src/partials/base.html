<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon-180.png">
<meta name="theme-color" content="#0f5c5b">
<title>{{TITLE}}</title>
<meta name="description" content="{{DESCRIPTION}}">
<meta name="keywords" content="{{KEYWORDS}}">
<link rel="canonical" href="{{CANONICAL}}">
{{HREFLANGS}}

<meta property="og:type" content="website">
<meta property="og:site_name" content="{{SITE_NAME}}">
<meta property="og:title" content="{{TITLE}}">
<meta property="og:description" content="{{DESCRIPTION}}">
<meta property="og:image" content="{{OG_IMAGE}}">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="stylesheet" href="/styles.css?v={{ASSET_VERSION}}">
{{SCHEMA}}
</head>
<body>
{{HEADER}}
<main id="main">
{{BODY}}
</main>
{{FOOTER}}
<div class="wa-float" id="waFloat" hidden aria-hidden="true">

    <button class="wa-teaser-close" id="waTeaserClose" type="button" aria-label="Close">&times;</button>

    <a class="wa-teaser-cta" href="{{WHATSAPP_URL}}" target="_blank" rel="noopener">Start chat</a>
  </div>

</div>

</html>
